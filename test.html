<!DOCTYPE html>
<html>
<head>
    <title>Your Portfolio</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>


    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        
        header {
            background-color: #333;
            color: white;
            padding: 20px 0;
        }
        
        #portfolio {
            padding: 20px;
        }
        
        .carousel {
            display: flex;
            overflow-x: auto;
        }
        
        .carousel-item {
            margin-right: 15px;
        }
        
        .carousel-item img {
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 5px;
        }
        
        #about, #contact {
            padding: 20px;
        }
        
        footer {
            background-color: #333;
            color: white;
            padding: 10px 0;
        }
        
    </style>

    <header>
        <h1>Your Name</h1>
        <p>Profession</p>
    </header>

    <section id="portfolio">
        <div class="carousel">
            <div class="carousel-item">
                <img src="path_to_your_image1.jpg" alt="Project 1">
                <p>Project Description 1</p>
            </div>
            <div class="carousel-item">
                <img src="path_to_your_image2.jpg" alt="Project 2">
                <p>Project Description 2</p>
            </div>
            <!-- Add more carousel items here -->
        </div>
    </section>

    <section id="about">
        <h2>About Me</h2>
        <p>Brief bio here...</p>
        <!-- Interactive elements can be added here -->
    </section>

    <section id="contact">
        <h2>Contact Me</h2>
        <p>Chatbot interface placeholder</p>
        <!-- Chatbot Interface Code Goes Here -->
    </section>

    <footer>
        <p>Social Media Icons</p>
        <!-- Add actual icons here -->
    </footer>

    <script src="script.js"></script>
</body>
</html>
